# Nginx 站点配置：静态前端 + 后端 API 反向代理（含 SSE 流式透传）
# 安装（麒麟/RHEL 系，conf.d 方式）：
#   sudo cp deploy/nginx/device-repair.conf /etc/nginx/conf.d/device-repair.conf
#   sudo nginx -t && sudo systemctl reload nginx
# 注意：确保 /etc/nginx/nginx.conf 的 http{} 默认 server 不与本配置 80 端口冲突。

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    # SELinux：若开启，需允许 nginx 反代与读取静态目录，见 deploy/README.md 排雷
    charset utf-8;

    # ---- 前端静态资源（在开发机 npm run build 后，将 frontend/dist 拷到此处）----
    root   /opt/device-repair/frontend/dist;
    index  index.html;

    # 优先发送构建期预压缩的 .gz（vite-plugin-compression 生成），省 CPU、提速数倍
    gzip_static  on;
    # 无预压缩件时的动态 gzip 兜底
    gzip         on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types   text/plain text/css application/javascript application/json image/svg+xml;

    # 前端用 hash 路由，根路径回退到 index.html 即可
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（带内容指纹的 js/css 可长缓存）
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 7d;
        access_log off;
    }

    # ---- 后端 API + SSE 流式 ----
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # —— SSE 关键：关闭缓冲与缓存，让 token 实时下推 ——
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Connection        "";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # PDF / 故障图片上传体积上限
    client_max_body_size 30m;
}
